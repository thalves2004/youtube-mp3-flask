<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube MP3</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <div class="container">
        <h1>YouTube para MP3</h1>
    </div>
</header>

<main>
    <div class="content">
        <div class="box">
            <form method="POST">
                <input class="cole" type="text" name="url" placeholder="Cole o link do vídeo aqui ..." required>
                <button class="download" type="submit">Baixar MP3</button>
            </form>
        </div>

        <div class="area_recentes" id="downloads">
            <h2>Downloads Recentes</h2>

            {% for d in downloads %}
            <div class="item">
                <img src="{{ d.thumb }}" alt="" width="120">  
                <span>{{ d.titulo }}</span>
                <a href="{{ url_for('download', arquivo=d.arquivo) }}">Baixar</a>
            </div>
            {% endfor %}
        </div>
    </div>
</main>

</body>
</html>
